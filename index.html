<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Coca-Cola Catch</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Bebas+Neue&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden; touch-action: none; background: #000;
    font-family: 'IBM Plex Mono', monospace;
    -webkit-user-select: none; user-select: none;
    position: fixed; width: 100%; height: 100%;
  }
  #camera-feed { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
  #game-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
  .no-camera-bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse at center, #1a1a1a 0%, #000 100%); }

  /* Bucket image overlay */
  #bucket-img {
    position: fixed;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    width: 200px;
    height: auto;
    pointer-events: none;
    display: none;
  }

  /* Score HUD */
  #score-hud {
    position: fixed;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
    display: none;
  }
  .score-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 3px; color: rgba(255,255,255,0.4);
  }
  .score-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px; color: #fff; line-height: 1;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }

  /* Catch VFX */
  .catch-flash {
    position: fixed; z-index: 15;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px; color: #FFD700;
    text-shadow: 0 0 30px rgba(255,215,0,0.8);
    pointer-events: none;
    animation: floatUp 0.9s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translate(-50%, 0) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -100px) scale(1.6); }
  }
  .particle {
    position: fixed; z-index: 15; border-radius: 50%; pointer-events: none;
    animation: particleBurst 0.7s ease-out forwards;
  }
  @keyframes particleBurst {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
  }

  /* Splash ring */
  .splash-ring {
    position: fixed; z-index: 14; pointer-events: none;
    border: 3px solid rgba(255,255,255,0.6);
    border-radius: 50%;
    animation: splashExpand 0.5s ease-out forwards;
  }
  @keyframes splashExpand {
    0% { opacity: 1; width: 20px; height: 20px; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; width: 120px; height: 120px; transform: translate(-50%,-50%) scale(1); }
  }

  /* Screen shake */
  @keyframes screenShake {
    0% { transform: translate(0,0); }
    10% { transform: translate(-4px, 3px); }
    20% { transform: translate(5px, -4px); }
    30% { transform: translate(-3px, 5px); }
    40% { transform: translate(4px, -2px); }
    50% { transform: translate(-5px, 3px); }
    60% { transform: translate(3px, -4px); }
    70% { transform: translate(-2px, 4px); }
    80% { transform: translate(4px, -3px); }
    90% { transform: translate(-3px, 2px); }
    100% { transform: translate(0,0); }
  }
  .shaking { animation: screenShake 0.4s ease-out; }

  /* Start screen */
  #start-screen { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
  #start-screen.hidden { display: none; }
  .start-version { font-size: 64px; font-weight: 600; color: rgba(255,255,255,0.9); letter-spacing: 4px; margin-bottom: 8px; }
  .start-label { font-size: 13px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 60px; }
  #start-btn { background: rgba(244,0,9,0.9); color: white; border: none; font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; padding: 16px 40px; border-radius: 8px; cursor: pointer; letter-spacing: 2px; }
  #start-btn:active { transform: scale(0.96); }

  /* Sensor toggle button */
  #sensor-toggle {
    position: fixed; bottom: 12px; left: 12px; z-index: 20;
    background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600;
    padding: 6px 10px; cursor: pointer; display: none;
    letter-spacing: 1px;
  }
  #sensor-toggle:active { background: rgba(255,255,255,0.1); }

  /* Sensor panel */
  #sensor-panel {
    position: fixed; bottom: 45px; left: 12px; right: 12px; z-index: 10;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 12px;
    padding: 14px 16px; display: none;
  }
  #sensor-panel.collapsed { display: none !important; }
  .debug-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; color: rgba(255,255,255,0.4); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .debug-row { display: flex; align-items: center; margin-bottom: 8px; }
  .debug-row:last-child { margin-bottom: 0; }
  .debug-label { font-size: 13px; font-weight: 600; width: 18px; flex-shrink: 0; }
  .debug-label.x-axis { color: #ff6b6b; }
  .debug-label.y-axis { color: #51cf66; }
  .debug-label.z-axis { color: #339af0; }
  .debug-bar-track { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; margin: 0 8px; overflow: hidden; }
  .debug-bar-fill { height: 100%; border-radius: 3px; transition: width 0.05s linear; }
  .debug-bar-fill.x-axis { background: #ff6b6b; }
  .debug-bar-fill.y-axis { background: #51cf66; }
  .debug-bar-fill.z-axis { background: #339af0; }
  .debug-val { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7); width: 55px; text-align: right; font-variant-numeric: tabular-nums; }
  .slider-row { display: flex; align-items: center; margin-bottom: 8px; }
  .slider-row:last-child { margin-bottom: 0; }
  .slider-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); width: 55px; flex-shrink: 0; }
  .slider-label.y-sens { color: #51cf66; }
  .slider-label.z-sens { color: #339af0; }
  input[type="range"] { flex: 1; margin: 0 8px; height: 4px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.15); border-radius: 2px; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #fff; cursor: pointer; border: none; }
  input[type="range"]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: #fff; cursor: pointer; border: none; }
  .slider-val { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6); width: 30px; text-align: right; font-variant-numeric: tabular-nums; }
  .section-gap { height: 8px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 10px; }
</style>

function toggleSensors() {
  const panel = document.getElementById('sensor-panel');
  sensorPanelOpen = !sensorPanelOpen;
  if (sensorPanelOpen) {
    panel.style.display = 'block';
    panel.classList.remove('collapsed');
  } else {
    panel.style.display = 'none';
    panel.classList.add('collapsed');
  }
}

const canvas = document.getElementById('game-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
const aspect = window.innerWidth / window.innerHeight;
const viewH = 14;
let viewW = viewH * aspect;
const cam = new THREE.OrthographicCamera(-viewW/2, viewW/2, viewH/2, -viewH/2, 0.1, 100);
cam.position.z = 10;

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(3, 5, 8); scene.add(dirLight);
const rimLight = new THREE.DirectionalLight(0xff4444, 0.2);
rimLight.position.set(-3, 2, -4); scene.add(rimLight);

// ============================================================
// TEXTURE
// ============================================================
const textureLoader = new THREE.TextureLoader();
let canTexture = null;
function loadTexture() {
  return new Promise((resolve) => {
    canTexture = textureLoader.load(CAN_TEXTURE_URI, (tex) => {
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.ClampToEdgeWrapping;
      tex.encoding = THREE.sRGBEncoding;
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      resolve(tex);
    });
  });
}

// ============================================================
// CAN CREATION
// ============================================================
function createCan(isGold) {
  const group = new THREE.Group();
  const r = 0.3, h = 0.95;
  const bodyGeo = new THREE.CylinderGeometry(r, r, h, 32, 1, true);
  let bodyMat;
  if (isGold) {
    bodyMat = new THREE.MeshPhongMaterial({ color: 0xFFD700, specular: 0xffffff, shininess: 200, emissive: 0x665500, emissiveIntensity: 0.4 });
  } else {
    bodyMat = new THREE.MeshPhongMaterial({ map: canTexture, specular: 0x666666, shininess: 120 });
  }
  group.add(new THREE.Mesh(bodyGeo, bodyMat));

  const capMat = new THREE.MeshPhongMaterial({ color: 0xC0C0C0, specular: 0xffffff, shininess: 200 });
  const capGeo = new THREE.CircleGeometry(r, 32);
  const topCap = new THREE.Mesh(capGeo, capMat);
  topCap.position.y = h/2; topCap.rotation.x = -Math.PI/2; group.add(topCap);
  const bottomCap = new THREE.Mesh(capGeo, capMat);
  bottomCap.position.y = -h/2; bottomCap.rotation.x = Math.PI/2; group.add(bottomCap);

  const rimGeo = new THREE.TorusGeometry(r, 0.025, 8, 32);
  const rimMat = new THREE.MeshPhongMaterial({ color: 0xD0D0D0, specular: 0xffffff, shininess: 250 });
  const topRim = new THREE.Mesh(rimGeo, rimMat);
  topRim.position.y = h/2; topRim.rotation.x = Math.PI/2; group.add(topRim);
  const bottomRim = new THREE.Mesh(rimGeo, rimMat);
  bottomRim.position.y = -h/2; bottomRim.rotation.x = Math.PI/2; group.add(bottomRim);

  if (!isGold) {
    const tabGeo = new THREE.RingGeometry(0.03, 0.07, 8);
    const tab = new THREE.Mesh(tabGeo, new THREE.MeshPhongMaterial({ color: 0xA0A0A0, specular: 0xffffff, shininess: 200, side: THREE.DoubleSide }));
    tab.position.set(0.05, h/2+0.01, 0); tab.rotation.x = -Math.PI/2; group.add(tab);
  }

  if (isGold) {
    const star = new THREE.Shape();
    for (let i = 0; i < 10; i++) {
      const sr = i%2===0?0.12:0.05, a = (i*Math.PI)/5-Math.PI/2;
      i===0 ? star.moveTo(Math.cos(a)*sr,Math.sin(a)*sr) : star.lineTo(Math.cos(a)*sr,Math.sin(a)*sr);
    }
    star.closePath();
    const sm = new THREE.Mesh(new THREE.ShapeGeometry(star), new THREE.MeshPhongMaterial({ color:0xffffff, emissive:0xFFFF00, emissiveIntensity:0.3, side:THREE.DoubleSide }));
    sm.position.set(0,0,r+0.01); group.add(sm);
  }
  return group;
}

const cans = [];
let lastSpawn = 0;
const SPAWN_INTERVAL = 1200;

// Bucket catch zone — in screen coordinates
const BUCKET_CENTER_X_RATIO = 0.5; // center of screen
const BUCKET_TOP_Y_RATIO = 0.78;   // bucket opening ~78% down screen
const BUCKET_CATCH_WIDTH = 200;     // px width of catch zone
const BUCKET_CATCH_HEIGHT = 40;     // px height of catch zone

function spawnCan() {
  const isGold = Math.random() < 0.12;
  const mesh = createCan(isGold);
  const spawnWidth = viewW + zSensitivity * 2;
  const x = smoothZOffset + (Math.random() - 0.5) * spawnWidth;
  mesh.position.set(x, smoothYOffset + viewH/2 + 1.5, 0);
  mesh.rotation.x = Math.random() * Math.PI;
  mesh.rotation.z = Math.random() * 0.5 - 0.25;
  scene.add(mesh);
  cans.push({ mesh, isGold, speed: 2+Math.random()*2, rotSpeedX:(Math.random()-0.5)*3, rotSpeedZ:(Math.random()-0.5)*2, wobble:Math.random()*Math.PI*2, wobbleSpeed:1+Math.random()*2, caught: false });
}

// ============================================================
// CATCH DETECTION & VFX
// ============================================================
function worldToScreen(worldPos) {
  const v = worldPos.clone().project(cam);
  return {
    x: (v.x * 0.5 + 0.5) * window.innerWidth,
    y: (-v.y * 0.5 + 0.5) * window.innerHeight
  };
}

function checkBucketCatch(can) {
  const sp = worldToScreen(can.mesh.position);
  const bucketCenterX = window.innerWidth * BUCKET_CENTER_X_RATIO;
  const bucketTopY = window.innerHeight * BUCKET_TOP_Y_RATIO;
  const dx = Math.abs(sp.x - bucketCenterX);
  const dy = sp.y - bucketTopY;
  return dx < BUCKET_CATCH_WIDTH/2 && dy > 0 && dy < BUCKET_CATCH_HEIGHT;
}

function onCatch(can) {
  can.caught = true;
  const pts = can.isGold ? 50 : 10;
  score += pts;
  document.getElementById('score-val').textContent = score;

  const sp = worldToScreen(can.mesh.position);

  // Float score
  const f = document.createElement('div');
  f.className = 'catch-flash';
  f.textContent = '+' + pts;
  if (can.isGold) f.style.color = '#FFD700';
  f.style.left = sp.x + 'px'; f.style.top = sp.y + 'px';
  document.body.appendChild(f);
  setTimeout(() => f.remove(), 900);

  // Splash ring
  const ring = document.createElement('div');
  ring.className = 'splash-ring';
  ring.style.left = sp.x + 'px'; ring.style.top = sp.y + 'px';
  document.body.appendChild(ring);
  setTimeout(() => ring.remove(), 500);

  // Particles
  const colors = can.isGold ? ['#FFD700','#FFF0A0','#FFAA00'] : ['#F40009','#ff4444','#ffffff'];
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 6;
    p.style.width = size+'px'; p.style.height = size+'px';
    p.style.left = sp.x+'px'; p.style.top = sp.y+'px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    const angle = (i/12)*Math.PI*2 + Math.random()*0.5;
    const dist = 50 + Math.random()*60;
    p.style.setProperty('--px', Math.cos(angle)*dist+'px');
    p.style.setProperty('--py', Math.sin(angle)*dist+'px');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 700);
  }

  // Screen shake
  document.body.classList.remove('shaking');
  void document.body.offsetWidth;
  document.body.classList.add('shaking');
  setTimeout(() => document.body.classList.remove('shaking'), 400);

  // Haptic feedback
  if (navigator.vibrate) navigator.vibrate(80);

  // Shrink can
  const start = performance.now(), m = can.mesh;
  (function shrink(t) {
    const s = Math.max(0, 1 - (t - start) / 250);
    m.scale.set(s, s, s);
    s > 0 ? requestAnimationFrame(shrink) : scene.remove(m);
  })(start);
}

// ============================================================
// SLIDERS
// ============================================================
function initSliders() {
  document.getElementById('y-sens-slider').addEventListener('input', function() {
    ySensitivity = parseFloat(this.value);
    document.getElementById('y-sens-val').textContent = this.value;
  });
  document.getElementById('z-sens-slider').addEventListener('input', function() {
    zSensitivity = parseFloat(this.value);
    document.getElementById('z-sens-val').textContent = this.value;
  });
}

// ============================================================
// INIT
// ============================================================
async function init() {
  initSliders();

  // 1. Gyro
  const needsPerm = typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function';
  if (needsPerm) {
    try {
      const resp = await DeviceOrientationEvent.requestPermission();
      if (resp === 'granted') window.addEventListener('deviceorientation', onOrientation);
    } catch (e) {}
  } else if ('DeviceOrientationEvent' in window) {
    window.addEventListener('deviceorientation', onOrientation);
  }

  // 2. Camera
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } });
    document.getElementById('camera-feed').srcObject = stream;
    document.getElementById('fallback-bg').style.display = 'none';
  } catch (e) {}

  // 3. Texture
  await loadTexture();

  // 4. UI
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('bucket-img').style.display = 'block';
  document.getElementById('score-hud').style.display = 'block';
  document.getElementById('sensor-toggle').style.display = 'block';

  requestAnimationFrame(gameLoop);
}

// ============================================================
// GYRO
// ============================================================
function onOrientation(e) {
  if (e.alpha === null && e.beta === null && e.gamma === null) return;
  if (!gyroActive) { gyroActive = true; }

  rawAlpha = e.alpha || 0; rawBeta = e.beta || 0; rawGamma = e.gamma || 0;
  if (betaBaseline === null) betaBaseline = rawBeta;

  normX = Math.max(0, Math.min(1, (rawGamma + 90) / 180));
  let deltaBeta = Math.max(-90, Math.min(90, rawBeta - betaBaseline));
  normY = Math.max(0, Math.min(1, (deltaBeta + 90) / 180));

  if (prevAlpha !== null) {
    let delta = rawAlpha - prevAlpha;
    if (delta > 180) delta -= 360;
    if (delta < -180) delta += 360;
    accumulatedZ += delta;
  }
  prevAlpha = rawAlpha;

  yOffset = (normY - 0.5) * 2 * ySensitivity;
  zOffset = -(accumulatedZ / 90) * zSensitivity;
}

// ============================================================
// LOOP
// ============================================================
let lastTime = 0;
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  smoothYOffset += (yOffset - smoothYOffset) * 0.1;
  smoothZOffset += (zOffset - smoothZOffset) * 0.1;
  cam.position.y = smoothYOffset;
  cam.position.x = smoothZOffset;

  if (timestamp - lastSpawn > SPAWN_INTERVAL) { spawnCan(); lastSpawn = timestamp; }

  for (let i = cans.length - 1; i >= 0; i--) {
    const c = cans[i];
    if (c.caught) continue;
    c.mesh.position.y -= c.speed * dt;
    c.mesh.rotation.x += c.rotSpeedX * dt;
    c.mesh.rotation.z += c.rotSpeedZ * dt;
    c.wobble += c.wobbleSpeed * dt;
    c.mesh.position.x += Math.sin(c.wobble) * 0.2 * dt;
    if (c.isGold) c.mesh.children[0].material.emissiveIntensity = Math.sin(timestamp*0.005)*0.15+0.4;

    // Check bucket catch
    if (checkBucketCatch(c)) { onCatch(c); continue; }

    // Cleanup
    const relY = c.mesh.position.y - smoothYOffset;
    const relX = c.mesh.position.x - smoothZOffset;
    if (relY < -viewH/2 - 3 || Math.abs(relX) > viewW/2 + zSensitivity + 5) {
      scene.remove(c.mesh); cans.splice(i, 1);
    }
  }

  // Debug
  if (sensorPanelOpen) {
    document.getElementById('bar-x').style.width = (normX*100)+'%';
    document.getElementById('bar-y').style.width = (normY*100)+'%';
    const zBar = Math.max(0, Math.min(1, 0.5+(accumulatedZ/360)));
    document.getElementById('bar-z').style.width = (zBar*100)+'%';
    document.getElementById('val-x').textContent = normX.toFixed(3);
    document.getElementById('val-y').textContent = normY.toFixed(3);
    document.getElementById('val-z').textContent = accumulatedZ.toFixed(1)+'°';
  }

  renderer.render(scene, cam);
}

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  const a = window.innerWidth / window.innerHeight;
  viewW = viewH * a;
  cam.left = -viewW/2; cam.right = viewW/2;
  cam.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
