<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Coca-Cola Catch — Gyro Debug</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    touch-action: none;
    background: #000;
    font-family: 'IBM Plex Mono', monospace;
    -webkit-user-select: none;
    user-select: none;
    position: fixed;
    width: 100%;
    height: 100%;
  }

  #camera-feed {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  .no-camera-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(ellipse at center, #1a1a1a 0%, #000 100%);
  }

  /* Start screen */
  #start-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  #start-screen.hidden { display: none; }

  .start-version {
    font-size: 64px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    letter-spacing: 4px;
    margin-bottom: 8px;
  }

  .start-label {
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 60px;
  }

  #start-btn {
    background: rgba(244,0,9,0.9);
    color: white;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    padding: 16px 40px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 2px;
  }

  #start-btn:active { transform: scale(0.96); }

  /* Debug panels — stacked vertically for mobile */
  .debug-panel {
    position: fixed;
    left: 12px;
    right: 12px;
    z-index: 10;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 14px 16px;
    display: none;
  }

  #debug-hud { top: 50px; }
  #debug-raw { top: 230px; }

  .debug-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .debug-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
  }

  .debug-row:last-child { margin-bottom: 0; }

  .debug-label {
    font-size: 14px;
    font-weight: 600;
    width: 20px;
    flex-shrink: 0;
  }

  .debug-label.x-axis { color: #ff6b6b; }
  .debug-label.y-axis { color: #51cf66; }
  .debug-label.z-axis { color: #339af0; }

  .debug-bar-track {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    margin: 0 10px;
    position: relative;
    overflow: hidden;
  }

  .debug-bar-fill {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    border-radius: 4px;
    transition: width 0.05s linear;
  }

  .debug-bar-fill.x-axis { background: #ff6b6b; }
  .debug-bar-fill.y-axis { background: #51cf66; }
  .debug-bar-fill.z-axis { background: #339af0; }

  .debug-val {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    width: 50px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* Raw values — single column list */
  .raw-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 13px;
  }

  .raw-row:last-child { margin-bottom: 0; }

  .raw-label { color: rgba(255,255,255,0.4); }
  .raw-val { color: rgba(255,255,255,0.7); font-variant-numeric: tabular-nums; }

  /* Status */
  #gyro-status {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    text-align: center;
    display: none;
  }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }

  .status-dot.off { background: #ff6b6b; }
  .status-dot.on { background: #51cf66; }

  .version-tag-small {
    position: fixed;
    bottom: 8px;
    right: 12px;
    z-index: 10;
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    display: none;
  }
</style>
</head>
<body>

<div class="no-camera-bg" id="fallback-bg"></div>
<video id="camera-feed" autoplay playsinline muted></video>

<!-- Start screen with big version -->
<div id="start-screen">
  <div class="start-version">v2.2.0</div>
  <div class="start-label">Gyro Debug Build</div>
  <button id="start-btn" onclick="init()">TAP TO START</button>
</div>

<!-- Normalized 0-1 readout -->
<div id="debug-hud" class="debug-panel">
  <div class="debug-title">Gyro — Normalized 0–1</div>
  <div class="debug-row">
    <div class="debug-label x-axis">X</div>
    <div class="debug-bar-track"><div class="debug-bar-fill x-axis" id="bar-x"></div></div>
    <div class="debug-val" id="val-x">0.000</div>
  </div>
  <div class="debug-row">
    <div class="debug-label y-axis">Y</div>
    <div class="debug-bar-track"><div class="debug-bar-fill y-axis" id="bar-y"></div></div>
    <div class="debug-val" id="val-y">0.000</div>
  </div>
  <div class="debug-row">
    <div class="debug-label z-axis">Z</div>
    <div class="debug-bar-track"><div class="debug-bar-fill z-axis" id="bar-z"></div></div>
    <div class="debug-val" id="val-z">0.000</div>
  </div>
</div>

<!-- Raw degree values -->
<div id="debug-raw" class="debug-panel">
  <div class="debug-title">Raw Degrees</div>
  <div class="raw-row">
    <span class="raw-label">alpha (yaw)</span>
    <span class="raw-val" id="raw-alpha">—</span>
  </div>
  <div class="raw-row">
    <span class="raw-label">beta (pitch)</span>
    <span class="raw-val" id="raw-beta">—</span>
  </div>
  <div class="raw-row">
    <span class="raw-label">gamma (tilt)</span>
    <span class="raw-val" id="raw-gamma">—</span>
  </div>
  <div class="raw-row" style="margin-top:8px; padding-top:6px; border-top:1px solid rgba(255,255,255,0.1);">
    <span class="raw-label">baseline α</span>
    <span class="raw-val" id="raw-baseline">—</span>
  </div>
</div>

<div id="gyro-status">
  <span class="status-dot off" id="status-dot"></span>
  <span id="status-text">Gyroscope: waiting...</span>
</div>

<div class="version-tag-small" id="version-small">v2.2.0</div>

<script>
// ============================================================
// STATE
// ============================================================
let gyroActive = false;
let alphaBaseline = null;
let rawAlpha = 0, rawBeta = 0, rawGamma = 0;
let normX = 0.5, normY = 0.5, normZ = 0.5;

// ============================================================
// INIT — permissions FIRST, then camera
// ============================================================
async function init() {
  // 1. Request gyro permission FIRST (iOS requires user gesture)
  const needsPerm = typeof DeviceOrientationEvent !== 'undefined'
    && typeof DeviceOrientationEvent.requestPermission === 'function';

  if (needsPerm) {
    try {
      const resp = await DeviceOrientationEvent.requestPermission();
      if (resp === 'granted') {
        window.addEventListener('deviceorientation', onOrientation);
      } else {
        setStatus(false, 'Gyroscope: permission denied');
      }
    } catch (e) {
      setStatus(false, 'Gyroscope: permission error');
    }
  } else if ('DeviceOrientationEvent' in window) {
    window.addEventListener('deviceorientation', onOrientation);
    setTimeout(() => {
      if (!gyroActive) setStatus(false, 'Gyroscope: not available');
    }, 2000);
  } else {
    setStatus(false, 'Gyroscope: not supported');
  }

  // 2. Then camera
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    document.getElementById('camera-feed').srcObject = stream;
    document.getElementById('fallback-bg').style.display = 'none';
  } catch (e) {
    console.log('Camera not available');
  }

  // 3. Show debug UI
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('debug-hud').style.display = 'block';
  document.getElementById('debug-raw').style.display = 'block';
  document.getElementById('gyro-status').style.display = 'block';
  document.getElementById('version-small').style.display = 'block';

  requestAnimationFrame(update);
}

// ============================================================
// ORIENTATION HANDLER
// ============================================================
function onOrientation(e) {
  if (e.alpha === null && e.beta === null && e.gamma === null) return;

  if (!gyroActive) {
    gyroActive = true;
    setStatus(true, 'Gyroscope: active');
  }

  rawAlpha = e.alpha || 0;
  rawBeta  = e.beta  || 0;
  rawGamma = e.gamma || 0;

  if (alphaBaseline === null) alphaBaseline = rawAlpha;

  // X: gamma (left/right tilt) -90..90 → 0..1
  normX = Math.max(0, Math.min(1, (rawGamma + 90) / 180));

  // Y: beta (pitch) -90..90 → 0..1
  normY = Math.max(0, Math.min(1, (rawBeta + 90) / 180));

  // Z: alpha relative to baseline -180..180 → 0..1
  let dAlpha = rawAlpha - alphaBaseline;
  if (dAlpha > 180) dAlpha -= 360;
  if (dAlpha < -180) dAlpha += 360;
  normZ = Math.max(0, Math.min(1, (dAlpha + 180) / 360));
}

// ============================================================
// RENDER LOOP
// ============================================================
function update() {
  requestAnimationFrame(update);

  document.getElementById('bar-x').style.width = (normX * 100) + '%';
  document.getElementById('bar-y').style.width = (normY * 100) + '%';
  document.getElementById('bar-z').style.width = (normZ * 100) + '%';

  document.getElementById('val-x').textContent = normX.toFixed(3);
  document.getElementById('val-y').textContent = normY.toFixed(3);
  document.getElementById('val-z').textContent = normZ.toFixed(3);

  document.getElementById('raw-alpha').textContent = rawAlpha.toFixed(1) + '°';
  document.getElementById('raw-beta').textContent  = rawBeta.toFixed(1) + '°';
  document.getElementById('raw-gamma').textContent = rawGamma.toFixed(1) + '°';
  document.getElementById('raw-baseline').textContent =
    alphaBaseline !== null ? alphaBaseline.toFixed(1) + '°' : '—';
}

// ============================================================
// STATUS
// ============================================================
function setStatus(active, text) {
  document.getElementById('status-dot').className = 'status-dot ' + (active ? 'on' : 'off');
  document.getElementById('status-text').textContent = text;
}
</script>
</body>
</html>
