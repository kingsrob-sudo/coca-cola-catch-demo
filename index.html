<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Coca-Cola Catch — Dev Build</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    touch-action: none;
    background: #000;
    font-family: 'IBM Plex Mono', monospace;
    -webkit-user-select: none;
    user-select: none;
    position: fixed;
    width: 100%;
    height: 100%;
  }

  #camera-feed {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  #game-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  .no-camera-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(ellipse at center, #1a1a1a 0%, #000 100%);
  }

  #start-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  #start-screen.hidden { display: none; }

  .start-version {
    font-size: 64px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    letter-spacing: 4px;
    margin-bottom: 8px;
  }

  .start-label {
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 60px;
  }

  #start-btn {
    background: rgba(244,0,9,0.9);
    color: white;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    padding: 16px 40px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 2px;
  }

  #start-btn:active { transform: scale(0.96); }

  #debug-hud {
    position: fixed;
    bottom: 130px;
    left: 12px;
    right: 12px;
    z-index: 10;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 14px 16px;
    display: none;
  }

  .debug-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .debug-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
  }

  .debug-row:last-child { margin-bottom: 0; }

  .debug-label {
    font-size: 14px;
    font-weight: 600;
    width: 20px;
    flex-shrink: 0;
  }

  .debug-label.x-axis { color: #ff6b6b; }
  .debug-label.y-axis { color: #51cf66; }
  .debug-label.z-axis { color: #339af0; }

  .debug-bar-track {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    margin: 0 10px;
    position: relative;
    overflow: hidden;
  }

  .debug-bar-fill {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    border-radius: 4px;
    transition: width 0.05s linear;
  }

  .debug-bar-fill.x-axis { background: #ff6b6b; }
  .debug-bar-fill.y-axis { background: #51cf66; }
  .debug-bar-fill.z-axis { background: #339af0; }

  .debug-val {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    width: 50px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  #sensitivity-panel {
    position: fixed;
    bottom: 30px;
    left: 12px;
    right: 12px;
    z-index: 10;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 14px 16px;
    display: none;
  }

  .slider-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
  }

  .slider-row:last-child { margin-bottom: 0; }

  .slider-label {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    width: 70px;
    flex-shrink: 0;
  }

  .slider-label.y-sens { color: #51cf66; }
  .slider-label.z-sens { color: #339af0; }

  input[type="range"] {
    flex: 1;
    margin: 0 10px;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    border: none;
  }

  input[type="range"]::-moz-range-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    border: none;
  }

  .slider-val {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    width: 36px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  #gyro-status {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    display: none;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }

  .status-dot.off { background: #ff6b6b; }
  .status-dot.on { background: #51cf66; }
</style>
</head>
<body>

<div class="no-camera-bg" id="fallback-bg"></div>
<video id="camera-feed" autoplay playsinline muted></video>
<canvas id="game-canvas"></canvas>

<div id="start-screen">
  <div class="start-version">v2.5.1</div>
  <div class="start-label">Dev Build — Z Inverted</div>
  <button id="start-btn" onclick="init()">TAP TO START</button>
</div>

<div id="debug-hud">
  <div class="debug-title">Gyro — Normalized 0–1</div>
  <div class="debug-row">
    <div class="debug-label x-axis">X</div>
    <div class="debug-bar-track"><div class="debug-bar-fill x-axis" id="bar-x"></div></div>
    <div class="debug-val" id="val-x">0.000</div>
  </div>
  <div class="debug-row">
    <div class="debug-label y-axis">Y</div>
    <div class="debug-bar-track"><div class="debug-bar-fill y-axis" id="bar-y"></div></div>
    <div class="debug-val" id="val-y">0.000</div>
  </div>
  <div class="debug-row">
    <div class="debug-label z-axis">Z</div>
    <div class="debug-bar-track"><div class="debug-bar-fill z-axis" id="bar-z"></div></div>
    <div class="debug-val" id="val-z">0.000</div>
  </div>
</div>

<div id="sensitivity-panel">
  <div class="debug-title">Sensitivity</div>
  <div class="slider-row">
    <div class="slider-label y-sens">Y Sens</div>
    <input type="range" id="y-sens-slider" min="1" max="50" value="24" step="1">
    <div class="slider-val" id="y-sens-val">24</div>
  </div>
  <div class="slider-row">
    <div class="slider-label z-sens">Z Sens</div>
    <input type="range" id="z-sens-slider" min="1" max="50" value="24" step="1">
    <div class="slider-val" id="z-sens-val">24</div>
  </div>
</div>

<div id="gyro-status">
  <span class="status-dot off" id="status-dot"></span>
  <span id="status-text">Gyroscope: waiting...</span>
</div>

<script>
// ============================================================
// GYRO STATE
// ============================================================
let gyroActive = false;
let alphaBaseline = null;
let betaBaseline = null;
let rawAlpha = 0, rawBeta = 0, rawGamma = 0;
let normX = 0.5, normY = 0.5, normZ = 0.5;

let yOffset = 0, zOffset = 0;
let smoothYOffset = 0, smoothZOffset = 0;

let ySensitivity = 24;
let zSensitivity = 24;

// ============================================================
// THREE.JS SETUP
// ============================================================
const canvas = document.getElementById('game-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
const aspect = window.innerWidth / window.innerHeight;
const viewH = 14;
let viewW = viewH * aspect;
const cam = new THREE.OrthographicCamera(-viewW/2, viewW/2, viewH/2, -viewH/2, 0.1, 100);
cam.position.z = 10;

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
dirLight.position.set(3, 5, 8);
scene.add(dirLight);
const rimLight = new THREE.DirectionalLight(0xff4444, 0.3);
rimLight.position.set(-3, 2, -4);
scene.add(rimLight);

// ============================================================
// CAN CREATION
// ============================================================
function createCan(isGold) {
  const group = new THREE.Group();
  const r = isGold ? 0.3 : 0.28;
  const h = isGold ? 0.9 : 0.85;

  const bodyMat = new THREE.MeshPhongMaterial({
    color: isGold ? 0xFFD700 : 0xD40009,
    specular: 0xffffff, shininess: isGold ? 200 : 100,
    emissive: isGold ? 0x665500 : 0x330000,
    emissiveIntensity: isGold ? 0.4 : 0.2
  });
  group.add(new THREE.Mesh(new THREE.CylinderGeometry(r, r, h, 24), bodyMat));

  const rimMat = new THREE.MeshPhongMaterial({
    color: isGold ? 0xFFF0A0 : 0xC0C0C0, specular: 0xffffff, shininess: 200
  });
  const rimGeo = new THREE.TorusGeometry(r - 0.02, 0.03, 8, 24);

  const topRim = new THREE.Mesh(rimGeo, rimMat);
  topRim.position.y = h/2; topRim.rotation.x = Math.PI/2;
  group.add(topRim);

  const bottomRim = topRim.clone();
  bottomRim.position.y = -h/2;
  group.add(bottomRim);

  const cap = new THREE.Mesh(new THREE.CircleGeometry(r - 0.02, 24), rimMat);
  cap.position.y = h/2 + 0.01; cap.rotation.x = -Math.PI/2;
  group.add(cap);

  if (!isGold) {
    const stripe = new THREE.Mesh(
      new THREE.CylinderGeometry(r + 0.005, r + 0.005, 0.15, 24),
      new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 60 })
    );
    stripe.position.y = 0.05;
    group.add(stripe);
  }

  if (isGold) {
    const star = new THREE.Shape();
    for (let i = 0; i < 10; i++) {
      const sr = i % 2 === 0 ? 0.12 : 0.05;
      const a = (i * Math.PI) / 5 - Math.PI / 2;
      i === 0 ? star.moveTo(Math.cos(a)*sr, Math.sin(a)*sr)
              : star.lineTo(Math.cos(a)*sr, Math.sin(a)*sr);
    }
    star.closePath();
    const starMesh = new THREE.Mesh(
      new THREE.ShapeGeometry(star),
      new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0xFFFF00, emissiveIntensity: 0.3, side: THREE.DoubleSide })
    );
    starMesh.position.set(0, 0, r + 0.01);
    group.add(starMesh);
  }

  return group;
}

// ============================================================
// CAN STATE
// ============================================================
const cans = [];
let lastSpawn = 0;
const SPAWN_INTERVAL = 1200;

function spawnCan() {
  const isGold = Math.random() < 0.12;
  const mesh = createCan(isGold);

  const spawnWidth = viewW + zSensitivity * 2;
  const x = smoothZOffset + (Math.random() - 0.5) * spawnWidth;
  mesh.position.set(x, smoothYOffset + viewH/2 + 1.5, 0);
  mesh.rotation.x = Math.random() * Math.PI;
  mesh.rotation.z = Math.random() * 0.5 - 0.25;

  scene.add(mesh);

  cans.push({
    mesh, isGold,
    speed: 2 + Math.random() * 2,
    rotSpeedX: (Math.random() - 0.5) * 3,
    rotSpeedZ: (Math.random() - 0.5) * 2,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 1 + Math.random() * 2,
  });
}

// ============================================================
// SLIDER SETUP
// ============================================================
function initSliders() {
  const ySlider = document.getElementById('y-sens-slider');
  const zSlider = document.getElementById('z-sens-slider');

  ySlider.addEventListener('input', () => {
    ySensitivity = parseFloat(ySlider.value);
    document.getElementById('y-sens-val').textContent = ySlider.value;
  });

  zSlider.addEventListener('input', () => {
    zSensitivity = parseFloat(zSlider.value);
    document.getElementById('z-sens-val').textContent = zSlider.value;
  });
}

// ============================================================
// INIT
// ============================================================
async function init() {
  initSliders();

  // 1. Gyro permission first
  const needsPerm = typeof DeviceOrientationEvent !== 'undefined'
    && typeof DeviceOrientationEvent.requestPermission === 'function';

  if (needsPerm) {
    try {
      const resp = await DeviceOrientationEvent.requestPermission();
      if (resp === 'granted') {
        window.addEventListener('deviceorientation', onOrientation);
      } else {
        setStatus(false, 'Gyroscope: permission denied');
      }
    } catch (e) {
      setStatus(false, 'Gyroscope: permission error');
    }
  } else if ('DeviceOrientationEvent' in window) {
    window.addEventListener('deviceorientation', onOrientation);
    setTimeout(() => {
      if (!gyroActive) setStatus(false, 'Gyroscope: not available');
    }, 2000);
  } else {
    setStatus(false, 'Gyroscope: not supported');
  }

  // 2. Camera
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    document.getElementById('camera-feed').srcObject = stream;
    document.getElementById('fallback-bg').style.display = 'none';
  } catch (e) {
    console.log('Camera not available');
  }

  // 3. Show UI
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('debug-hud').style.display = 'block';
  document.getElementById('sensitivity-panel').style.display = 'block';
  document.getElementById('gyro-status').style.display = 'block';

  requestAnimationFrame(gameLoop);
}

// ============================================================
// GYRO HANDLER
// ============================================================
function onOrientation(e) {
  if (e.alpha === null && e.beta === null && e.gamma === null) return;

  if (!gyroActive) {
    gyroActive = true;
    setStatus(true, 'Gyroscope: active');
  }

  rawAlpha = e.alpha || 0;
  rawBeta  = e.beta  || 0;
  rawGamma = e.gamma || 0;

  if (alphaBaseline === null) alphaBaseline = rawAlpha;
  if (betaBaseline === null) betaBaseline = rawBeta;

  // X: gamma -90..90 → 0..1
  normX = Math.max(0, Math.min(1, (rawGamma + 90) / 180));

  // Y: beta relative to baseline → 0..1
  let deltaBeta = rawBeta - betaBaseline;
  deltaBeta = Math.max(-90, Math.min(90, deltaBeta));
  normY = Math.max(0, Math.min(1, (deltaBeta + 90) / 180));

  // Z: alpha relative to baseline → 0..1
  let dAlpha = rawAlpha - alphaBaseline;
  if (dAlpha > 180) dAlpha -= 360;
  if (dAlpha < -180) dAlpha += 360;
  normZ = Math.max(0, Math.min(1, (dAlpha + 180) / 360));

  // Y offset: looking up → camera up → cans slide down
  yOffset = (normY - 0.5) * 2 * ySensitivity;

  // Z offset: INVERTED — turn right → cans go left (camera goes negative)
  // normZ > 0.5 = turned right, so we negate to move camera left
  zOffset = -(normZ - 0.5) * 2 * zSensitivity;
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  smoothYOffset += (yOffset - smoothYOffset) * 0.1;
  smoothZOffset += (zOffset - smoothZOffset) * 0.1;

  cam.position.y = smoothYOffset;
  cam.position.x = smoothZOffset;

  if (timestamp - lastSpawn > SPAWN_INTERVAL) {
    spawnCan();
    lastSpawn = timestamp;
  }

  for (let i = cans.length - 1; i >= 0; i--) {
    const c = cans[i];
    c.mesh.position.y -= c.speed * dt;
    c.mesh.rotation.x += c.rotSpeedX * dt;
    c.mesh.rotation.z += c.rotSpeedZ * dt;

    c.wobble += c.wobbleSpeed * dt;
    c.mesh.position.x += Math.sin(c.wobble) * 0.2 * dt;

    if (c.isGold) {
      c.mesh.children[0].material.emissiveIntensity = Math.sin(timestamp * 0.005) * 0.15 + 0.4;
    }

    const relY = c.mesh.position.y - smoothYOffset;
    const relX = c.mesh.position.x - smoothZOffset;
    if (relY < -viewH/2 - 3 || Math.abs(relX) > viewW/2 + zSensitivity + 5) {
      scene.remove(c.mesh);
      cans.splice(i, 1);
    }
  }

  document.getElementById('bar-x').style.width = (normX * 100) + '%';
  document.getElementById('bar-y').style.width = (normY * 100) + '%';
  document.getElementById('bar-z').style.width = (normZ * 100) + '%';
  document.getElementById('val-x').textContent = normX.toFixed(3);
  document.getElementById('val-y').textContent = normY.toFixed(3);
  document.getElementById('val-z').textContent = normZ.toFixed(3);

  renderer.render(scene, cam);
}

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  const a = window.innerWidth / window.innerHeight;
  viewW = viewH * a;
  cam.left = -viewW/2; cam.right = viewW/2;
  cam.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// STATUS
// ============================================================
function setStatus(active, text) {
  document.getElementById('status-dot').className = 'status-dot ' + (active ? 'on' : 'off');
  document.getElementById('status-text').textContent = text;
}
</script>
</body>
</html>
