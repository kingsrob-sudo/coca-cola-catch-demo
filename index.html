<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Coca-Cola Catch</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Bebas+Neue&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; touch-action: none; background: #000; font-family: 'IBM Plex Mono', monospace; -webkit-user-select: none; user-select: none; position: fixed; width: 100%; height: 100%; }
  #camera-feed { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
  #game-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
  .no-camera-bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse at center, #1a1a1a 0%, #000 100%); }
  #bucket-container { position: fixed; bottom: -15px; left: 50%; z-index: 0; pointer-events: none; display: none; transform-origin: bottom center; }
  #bucket-img { width: 220px; height: auto; display: block; }
  #score-hud { position: fixed; top: 50px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; pointer-events: none; display: none; }
  .score-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; color: rgba(255,255,255,0.4); }
  .score-value { font-family: 'Bebas Neue', sans-serif; font-size: 56px; color: #fff; line-height: 1; text-shadow: 0 2px 20px rgba(0,0,0,0.5); }
  .catch-flash { position: fixed; z-index: 15; font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: #FFD700; text-shadow: 0 0 30px rgba(255,215,0,0.8); pointer-events: none; animation: floatUp 0.9s ease-out forwards; }
  @keyframes floatUp { 0%{opacity:1;transform:translate(-50%,0) scale(1)} 100%{opacity:0;transform:translate(-50%,-100px) scale(1.6)} }
  .ice-cube { position: fixed; z-index: 15; pointer-events: none; background: rgba(200,230,255,0.7); border: 1px solid rgba(255,255,255,0.5); border-radius: 2px; box-shadow: inset 0 0 4px rgba(255,255,255,0.4), 0 0 6px rgba(150,200,255,0.3); animation: iceSplash 0.8s ease-out forwards; }
  @keyframes iceSplash { 0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)} 100%{opacity:0;transform:translate(var(--px),var(--py)) rotate(var(--rot)) scale(0.3)} }
  .splash-ring { position: fixed; z-index: 14; pointer-events: none; border: 2px solid rgba(200,230,255,0.5); border-radius: 50%; animation: splashExpand 0.5s ease-out forwards; }
  @keyframes splashExpand { 0%{opacity:1;width:20px;height:20px;transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;width:100px;height:100px;transform:translate(-50%,-50%) scale(1)} }
  @keyframes screenShake { 0%{transform:translate(0,0)} 10%{transform:translate(-3px,2px)} 20%{transform:translate(4px,-3px)} 30%{transform:translate(-2px,4px)} 40%{transform:translate(3px,-2px)} 50%{transform:translate(-4px,2px)} 60%{transform:translate(2px,-3px)} 70%{transform:translate(-2px,3px)} 80%{transform:translate(3px,-2px)} 90%{transform:translate(-2px,1px)} 100%{transform:translate(0,0)} }
  .shaking { animation: screenShake 0.35s ease-out; }
  #start-screen { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
  #start-screen.hidden { display: none; }
  .start-version { font-size: 64px; font-weight: 600; color: rgba(255,255,255,0.9); letter-spacing: 4px; margin-bottom: 8px; }
  .start-label { font-size: 13px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 60px; }
  #start-btn { background: rgba(244,0,9,0.9); color: white; border: none; font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; padding: 16px 40px; border-radius: 8px; cursor: pointer; letter-spacing: 2px; }
  #start-btn:active { transform: scale(0.96); }
  #sensor-toggle { position: fixed; bottom: 12px; left: 12px; z-index: 20; background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; padding: 6px 10px; cursor: pointer; display: none; letter-spacing: 1px; }
  #sensor-toggle:active { background: rgba(255,255,255,0.1); }
  #sensor-panel { position: fixed; bottom: 45px; left: 12px; right: 12px; z-index: 20; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 14px 16px; display: none; }
  #sensor-panel.collapsed { display: none !important; }
  .debug-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; color: rgba(255,255,255,0.4); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .debug-row { display: flex; align-items: center; margin-bottom: 8px; }
  .debug-row:last-child { margin-bottom: 0; }
  .debug-label { font-size: 13px; font-weight: 600; width: 18px; flex-shrink: 0; }
  .debug-label.x-axis { color: #ff6b6b; } .debug-label.y-axis { color: #51cf66; } .debug-label.z-axis { color: #339af0; }
  .debug-bar-track { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; margin: 0 8px; overflow: hidden; }
  .debug-bar-fill { height: 100%; border-radius: 3px; transition: width 0.05s linear; }
  .debug-bar-fill.x-axis { background: #ff6b6b; } .debug-bar-fill.y-axis { background: #51cf66; } .debug-bar-fill.z-axis { background: #339af0; }
  .debug-val { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7); width: 55px; text-align: right; font-variant-numeric: tabular-nums; }
  .slider-row { display: flex; align-items: center; margin-bottom: 8px; }
  .slider-row:last-child { margin-bottom: 0; }
  .slider-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); width: 55px; flex-shrink: 0; }
  .slider-label.x-sens { color: #ff6b6b; } .slider-label.y-sens { color: #51cf66; }
  input[type="range"] { flex: 1; margin: 0 8px; height: 4px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.15); border-radius: 2px; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #fff; cursor: pointer; border: none; }
  input[type="range"]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: #fff; cursor: pointer; border: none; }
  .slider-val { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6); width: 30px; text-align: right; font-variant-numeric: tabular-nums; }
  .section-gap { height: 8px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 10px; }
</style>
</head>

function toggleSensors(){const p=document.getElementById('sensor-panel');sensorPanelOpen=!sensorPanelOpen;p.style.display=sensorPanelOpen?'block':'none';if(sensorPanelOpen)p.classList.remove('collapsed');else p.classList.add('collapsed');}

const canvas=document.getElementById('game-canvas');
const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.outputEncoding=THREE.sRGBEncoding;
const scene=new THREE.Scene();
const aspect=window.innerWidth/window.innerHeight;
const viewH=14;let viewW=viewH*aspect;
const cam=new THREE.OrthographicCamera(-viewW/2,viewW/2,viewH/2,-viewH/2,0.1,100);
cam.position.z=10;
scene.add(new THREE.AmbientLight(0xffffff,0.8));
const dirLight=new THREE.DirectionalLight(0xffffff,0.8);dirLight.position.set(3,5,8);scene.add(dirLight);
const rimL=new THREE.DirectionalLight(0xff4444,0.2);rimL.position.set(-3,2,-4);scene.add(rimL);

const textureLoader=new THREE.TextureLoader();
let canTexture=null;
function loadTexture(){return new Promise(resolve=>{canTexture=textureLoader.load(CAN_TEXTURE_URI,tex=>{tex.wrapS=THREE.RepeatWrapping;tex.wrapT=THREE.ClampToEdgeWrapping;tex.encoding=THREE.sRGBEncoding;tex.anisotropy=renderer.capabilities.getMaxAnisotropy();resolve(tex);});});}

function createCanGeometry(){
  const bodyR=0.28,topR=0.24,bottomR=0.25,h=0.95,taperH=0.08,lipH=0.02;
  const points=[new THREE.Vector2(bottomR,0),new THREE.Vector2(bottomR,lipH),new THREE.Vector2(bodyR,lipH+taperH),new THREE.Vector2(bodyR,h-lipH-taperH),new THREE.Vector2(topR,h-lipH),new THREE.Vector2(topR,h)];
  const geo=new THREE.LatheGeometry(points,32);geo.translate(0,-h/2,0);return geo;
}

function createCan(isGold){
  const group=new THREE.Group();const h=0.95,topR=0.24,bottomR=0.25;
  let bodyMat;
  if(isGold){bodyMat=new THREE.MeshPhongMaterial({color:0xFFD700,specular:0xffffff,shininess:200,emissive:0x665500,emissiveIntensity:0.4});}
  else{bodyMat=new THREE.MeshPhongMaterial({map:canTexture,specular:0x666666,shininess:120});}
  group.add(new THREE.Mesh(createCanGeometry(),bodyMat));
  const silverMat=new THREE.MeshPhongMaterial({color:0xC8C8C8,specular:0xffffff,shininess:250,emissive:0x222222,emissiveIntensity:0.1});
  const topCap=new THREE.Mesh(new THREE.CircleGeometry(topR,32),silverMat);topCap.position.y=h/2;topCap.rotation.x=-Math.PI/2;group.add(topCap);
  const bottomCap=new THREE.Mesh(new THREE.CircleGeometry(bottomR,32),silverMat);bottomCap.position.y=-h/2;bottomCap.rotation.x=Math.PI/2;group.add(bottomCap);
  if(!isGold){const tab=new THREE.Mesh(new THREE.RingGeometry(0.025,0.06,8),new THREE.MeshPhongMaterial({color:0xA0A0A0,specular:0xffffff,shininess:200,side:THREE.DoubleSide}));tab.position.set(0.04,h/2+0.005,0);tab.rotation.x=-Math.PI/2;group.add(tab);}
  if(isGold){const star=new THREE.Shape();for(let i=0;i<10;i++){const sr=i%2===0?0.12:0.05,a=(i*Math.PI)/5-Math.PI/2;i===0?star.moveTo(Math.cos(a)*sr,Math.sin(a)*sr):star.lineTo(Math.cos(a)*sr,Math.sin(a)*sr);}star.closePath();const sm=new THREE.Mesh(new THREE.ShapeGeometry(star),new THREE.MeshPhongMaterial({color:0xffffff,emissive:0xFFFF00,emissiveIntensity:0.3,side:THREE.DoubleSide}));sm.position.set(0,0,0.29);group.add(sm);}
  return group;
}

const cans=[];let lastSpawn=0;const SPAWN_INTERVAL=1200;

function getBucketZone(){
  const img=document.getElementById('bucket-img');if(!img)return null;
  const rect=img.getBoundingClientRect();
  return{centerX:rect.left+rect.width/2,iceTopY:rect.top,iceCatchY:rect.top+50,catchWidth:rect.width*0.7};
}

function spawnCan(){
  const isGold=Math.random()<0.12;const mesh=createCan(isGold);
  const spawnWidth=viewW+xSensitivity*2;
  const x=smoothXOffset+(Math.random()-0.5)*spawnWidth;
  mesh.position.set(x,smoothYOffset+viewH/2+1.5,0);
  mesh.rotation.x=Math.random()*Math.PI;mesh.rotation.z=Math.random()*0.5-0.25;
  scene.add(mesh);
  cans.push({mesh,isGold,speed:3+Math.random()*3,rotSpeedX:(Math.random()-0.5)*3,rotSpeedZ:(Math.random()-0.5)*2,wobble:Math.random()*Math.PI*2,wobbleSpeed:1+Math.random()*2,caught:false});
}

function worldToScreen(wp){const v=wp.clone().project(cam);return{x:(v.x*0.5+0.5)*window.innerWidth,y:(-v.y*0.5+0.5)*window.innerHeight};}

function checkBucketCatch(c){
  const zone=getBucketZone();if(!zone)return false;
  const sp=worldToScreen(c.mesh.position);
  return Math.abs(sp.x-zone.centerX)<zone.catchWidth/2&&sp.y>zone.iceTopY&&sp.y<zone.iceCatchY;
}

function spawnIceCubes(x,y){
  for(let i=0;i<10;i++){
    const cube=document.createElement('div');cube.className='ice-cube';
    const w=6+Math.random()*10,h=5+Math.random()*8;
    cube.style.width=w+'px';cube.style.height=h+'px';
    cube.style.left=(x-w/2+Math.random()*30-15)+'px';cube.style.top=(y-h/2+Math.random()*20-10)+'px';
    const angle=(Math.random()-0.5)*Math.PI,dist=30+Math.random()*50;
    cube.style.setProperty('--px',Math.cos(angle)*dist+'px');cube.style.setProperty('--py',(Math.sin(angle)*dist-30)+'px');cube.style.setProperty('--rot',(Math.random()*360)+'deg');
    document.body.appendChild(cube);setTimeout(()=>cube.remove(),800);
  }
}

function onCatch(can){
  can.caught=true;const pts=can.isGold?50:10;score+=pts;
  document.getElementById('score-val').textContent=score;
  const sp=worldToScreen(can.mesh.position);
  const f=document.createElement('div');f.className='catch-flash';f.textContent='+'+pts;if(can.isGold)f.style.color='#FFD700';f.style.left=sp.x+'px';f.style.top=(sp.y-20)+'px';document.body.appendChild(f);setTimeout(()=>f.remove(),900);
  const ring=document.createElement('div');ring.className='splash-ring';ring.style.left=sp.x+'px';ring.style.top=sp.y+'px';document.body.appendChild(ring);setTimeout(()=>ring.remove(),500);
  spawnIceCubes(sp.x,sp.y);
  document.body.classList.remove('shaking');void document.body.offsetWidth;document.body.classList.add('shaking');setTimeout(()=>document.body.classList.remove('shaking'),350);
  if(navigator.vibrate)navigator.vibrate(60);
  const start=performance.now(),m=can.mesh;
  (function shrink(t){const s=Math.max(0,1-(t-start)/200);m.scale.set(s,s,s);s>0?requestAnimationFrame(shrink):scene.remove(m);})(start);
}

function initSliders(){
  document.getElementById('x-sens-slider').addEventListener('input',function(){xSensitivity=parseFloat(this.value);document.getElementById('x-sens-val').textContent=this.value;});
  document.getElementById('y-sens-slider').addEventListener('input',function(){ySensitivity=parseFloat(this.value);document.getElementById('y-sens-val').textContent=this.value;});
}

async function init(){
  initSliders();
  const needsPerm=typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function';
  if(needsPerm){try{const r=await DeviceOrientationEvent.requestPermission();if(r==='granted')window.addEventListener('deviceorientation',onOrientation);}catch(e){}}
  else if('DeviceOrientationEvent' in window){window.addEventListener('deviceorientation',onOrientation);}
  try{const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});document.getElementById('camera-feed').srcObject=stream;document.getElementById('fallback-bg').style.display='none';}catch(e){}
  await loadTexture();
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('bucket-container').style.display='block';
  document.getElementById('score-hud').style.display='block';
  document.getElementById('sensor-toggle').style.display='block';
  requestAnimationFrame(gameLoop);
}

function onOrientation(e){
  if(e.alpha===null&&e.beta===null&&e.gamma===null)return;
  gyroActive=true;
  rawAlpha=e.alpha||0;rawBeta=e.beta||0;rawGamma=e.gamma||0;
  if(betaBaseline===null)betaBaseline=rawBeta;
  if(prevGamma!==null){let dg=rawGamma-prevGamma;if(dg>90)dg-=180;if(dg<-90)dg+=180;accumulatedX+=dg;}
  prevGamma=rawGamma;
  let deltaBeta=Math.max(-90,Math.min(90,rawBeta-betaBaseline));
  normY=Math.max(0,Math.min(1,(deltaBeta+90)/180));
  if(prevAlpha!==null){let d=rawAlpha-prevAlpha;if(d>180)d-=360;if(d<-180)d+=360;accumulatedZ+=d;}
  prevAlpha=rawAlpha;
  xOffset=(accumulatedX/90)*xSensitivity;
  yOffset=(normY-0.5)*2*ySensitivity;
  bucketTilt=rawGamma;bucketShiftX=rawGamma;
}

let lastTime=0;
function gameLoop(timestamp){
  requestAnimationFrame(gameLoop);
  const dt=Math.min((timestamp-lastTime)/1000,0.05);lastTime=timestamp;
  smoothXOffset+=(xOffset-smoothXOffset)*0.1;
  smoothYOffset+=(yOffset-smoothYOffset)*0.1;
  cam.position.x=smoothXOffset;cam.position.y=smoothYOffset;

  smoothBucketTilt+=(bucketTilt-smoothBucketTilt)*0.08;
  smoothBucketShiftX+=(bucketShiftX-smoothBucketShiftX)*0.08;
  const container=document.getElementById('bucket-container');
  if(container){
    const tiltDeg=smoothBucketTilt*0.15;const shiftPx=smoothBucketShiftX*0.3;const scalePulse=1+Math.abs(smoothBucketTilt)*0.001;
    container.style.transform='translateX(calc(-50% + '+shiftPx+'px)) rotate('+tiltDeg+'deg) scale('+scalePulse+')';
  }

  if(timestamp-lastSpawn>SPAWN_INTERVAL){spawnCan();lastSpawn=timestamp;}

  for(let i=cans.length-1;i>=0;i--){
    const c=cans[i];if(c.caught)continue;
    c.mesh.position.y-=c.speed*dt;c.mesh.rotation.x+=c.rotSpeedX*dt;c.mesh.rotation.z+=c.rotSpeedZ*dt;
    c.wobble+=c.wobbleSpeed*dt;c.mesh.position.x+=Math.sin(c.wobble)*0.2*dt;
    if(c.isGold)c.mesh.children[0].material.emissiveIntensity=Math.sin(timestamp*0.005)*0.15+0.4;
    if(checkBucketCatch(c)){onCatch(c);continue;}
    const relY=c.mesh.position.y-smoothYOffset,relX=c.mesh.position.x-smoothXOffset;
    if(relY<-viewH/2-3||Math.abs(relX)>viewW/2+xSensitivity+5){scene.remove(c.mesh);cans.splice(i,1);}
  }

  if(sensorPanelOpen){
    const xBar=Math.max(0,Math.min(1,0.5+(accumulatedX/180)));
    document.getElementById('bar-x').style.width=(xBar*100)+'%';
    document.getElementById('bar-y').style.width=(normY*100)+'%';
    const zBar=Math.max(0,Math.min(1,0.5+(accumulatedZ/360)));
    document.getElementById('bar-z').style.width=(zBar*100)+'%';
    document.getElementById('val-x').textContent=accumulatedX.toFixed(1)+'°';
    document.getElementById('val-y').textContent=normY.toFixed(3);
    document.getElementById('val-z').textContent=accumulatedZ.toFixed(1)+'°';
  }
  renderer.render(scene,cam);
}

window.addEventListener('resize',()=>{const a=window.innerWidth/window.innerHeight;viewW=viewH*a;cam.left=-viewW/2;cam.right=viewW/2;cam.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
</script>
</body>
</html>
